services:
  trevor:
    build: .
    container_name: trevor
    env_file: .env
    volumes:
      - ./app:/app                                           # bind-mount for dev (hot reload)
      - /mnt/linux/docker/services/travelnet/data:/data:ro  # shared read-only access to travel.db
      - /mnt/linux/docker/services/Trevor/chroma:/chroma                         # persistent vector store
      - /home/dan/services/TravelNet/travel.yml:/config/travel.yml:ro # SSOT for travel. Injected in to prompt.
    ports:
      - "8300:8300"
    restart: unless-stopped
    networks:
      - travelnet
      
networks:
  travelnet:
    external: true      # defined by TravelNet's compose; Trevor just joins it
    name: travelnet
